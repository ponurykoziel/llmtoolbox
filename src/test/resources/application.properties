# ── Test profile: in-memory H2, create-drop ───────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:llmtoolbox_test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# ── Security: keep enabled so BearerAuthFilter runs ───────────────
quarkus.security.auth.enabled-in-dev-mode=true
quarkus.http.auth.basic=false
quarkus.http.auth.form.enabled=false
quarkus.security.jdbc.enabled=false

# ── Override all permission rules to permit ───────────────────────
# BearerAuthFilter is the sole gate for API paths
quarkus.http.auth.permission.api.policy=permit
quarkus.http.auth.permission.ui.policy=permit
quarkus.http.auth.permission.root.policy=permit
quarkus.http.auth.permission.swagger.policy=permit
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.openapi.policy=permit
quarkus.http.auth.permission.login.policy=permit
quarkus.http.auth.permission.jsec.policy=permit
quarkus.http.auth.permission.logout.policy=permit

# ── API key pepper for tests ──────────────────────────────────────
llmtoolbox.api-key.pepper=test-pepper

# ── Skip admin seeding ────────────────────────────────────────────
llmtoolbox.auth.seed-on-startup=false
llmtoolbox.auth.admin.username=admin
llmtoolbox.auth.admin.password=admin

# ── Bearer token for tests ────────────────────────────────────────
llmtoolbox.auth.token=test-bearer-token
