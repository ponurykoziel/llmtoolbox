<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(title='Preset Detail', activePath='/ui/presets', content=~{::#page-content})}">
<body>
<div id="page-content">
    <div class="breadcrumb" id="preset-path">
        <a href="/">Dashboard</a>
        <span class="sep">/</span>
        <a href="/ui/presets">Presets</a>
        <span class="sep">/</span>
        <strong id="breadcrumb-name">…</strong>
    </div>

    <h1 class="page-title" id="preset-title">Preset Detail</h1>
    <p class="page-subtitle">Viewing preset <code th:text="${presetName}">…</code></p>

    <div class="detail-grid" style="margin-bottom:24px;">
        <div class="card">
            <div class="card-body">
                <h3>Preset Info</h3>
                <div id="preset-info" class="stack" style="gap:12px;">
                    <div class="muted">Loading&hellip;</div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <h3>Actions</h3>
                <div class="stack" style="gap:8px;">
                    <a id="openapi-link" href="#" target="_blank" class="btn btn-primary" style="text-align:center;">OpenAPI JSON</a>
                    <button id="delete-btn" class="btn btn-danger" style="display:none;width:100%;">Delete Preset</button>
                </div>
                <div id="delete-status" class="status-box" style="margin-top:8px;"></div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    var presetName = /*[[${presetName}]]*/ '';

    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

    async function loadPreset() {
        try {
            var res = await fetch('/api/tools/basics/presets/' + encodeURIComponent(presetName));
            if (!res.ok) {
                document.getElementById('preset-info').innerHTML = '<div class="muted">Preset not found</div>';
                return;
            }
            var p = await res.json();
            document.getElementById('preset-title').textContent = p.name || 'Preset Detail';
            document.getElementById('breadcrumb-name').textContent = p.name || presetName;

            var prefixesDisplay = (p.prefixes || []).join(', ') || '&mdash;';

            var infoHtml = ''
                + '<div><span class="detail-label">Name</span>'
                + '<div class="detail-value" style="display:flex;align-items:center;gap:8px;">'
                + '<span id="display-name">' + esc(p.name || '&mdash;') + '</span>'
                + '<input id="edit-name" type="text" value="' + esc(p.name || '') + '" style="display:none;flex:1;padding:4px 8px;font-size:14px;" maxlength="128">'
                + '<button id="save-name-btn" class="btn btn-small btn-primary" style="display:none;">Save</button>'
                + '<button id="cancel-name-btn" class="btn btn-small" style="display:none;">Cancel</button>'
                + '<button id="edit-name-btn" class="edit-icon-btn" title="Edit name">&#9998;</button>'
                + '</div></div>'
                + '<div><span class="detail-label">Prefixes</span>'
                + '<div class="detail-value" style="display:flex;align-items:flex-start;gap:8px;">'
                + '<span id="display-prefixes" style="white-space:pre-wrap;">' + esc(prefixesDisplay) + '</span>'
                + '<textarea id="edit-prefixes" style="display:none;flex:1;padding:4px 8px;font-size:14px;min-height:60px;resize:vertical;" maxlength="4096">' + esc((p.prefixes || []).join(', ')) + '</textarea>'
                + '<button id="save-prefixes-btn" class="btn btn-small btn-primary" style="display:none;">Save</button>'
                + '<button id="cancel-prefixes-btn" class="btn btn-small" style="display:none;">Cancel</button>'
                + '<button id="edit-prefixes-btn" class="edit-icon-btn" title="Edit prefixes">&#9998;</button>'
                + '</div></div>';
            document.getElementById('preset-info').innerHTML = infoHtml;

            document.getElementById('openapi-link').href = '/api/openapi/preset/' + encodeURIComponent(p.name);
            document.getElementById('delete-btn').style.display = 'block';

            // Name inline edit
            var nameDisplay = document.getElementById('display-name');
            var nameInput = document.getElementById('edit-name');
            var nameSave = document.getElementById('save-name-btn');
            var nameCancel = document.getElementById('cancel-name-btn');
            var nameEdit = document.getElementById('edit-name-btn');

            nameEdit.addEventListener('click', function() {
                nameDisplay.style.display = 'none';
                nameEdit.style.display = 'none';
                nameInput.style.display = 'block';
                nameSave.style.display = 'inline-block';
                nameCancel.style.display = 'inline-block';
                nameInput.focus();
            });

            function cancelName() {
                nameInput.value = nameDisplay.textContent === '—' ? '' : nameDisplay.textContent;
                nameInput.style.display = 'none';
                nameSave.style.display = 'none';
                nameCancel.style.display = 'none';
                nameDisplay.style.display = 'inline';
                nameEdit.style.display = 'inline-block';
            }
            nameCancel.addEventListener('click', cancelName);

            nameSave.addEventListener('click', async function() {
                var newName = nameInput.value.trim();
                if (!newName) { cancelName(); return; }
                try {
                    var res = await fetch('/api/tools/basics/presets/' + encodeURIComponent(presetName), {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({name: newName, prefixes: (p.prefixes || []).join(', ')})
                    });
                    if (res.ok) {
                        var updated = await res.json();
                        nameDisplay.textContent = updated.name;
                        document.getElementById('preset-title').textContent = updated.name;
                        document.getElementById('breadcrumb-name').textContent = updated.name;
                        presetName = updated.name;
                        cancelName();
                        loadPreset();
                    } else {
                        var err = await res.json();
                        alert(err.error || err.message || 'Failed to update');
                    }
                } catch(e) {}
            });

            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') nameSave.click();
                if (e.key === 'Escape') cancelName();
            });

            // Prefixes inline edit
            var prefixesDisplayEl = document.getElementById('display-prefixes');
            var prefixesInput = document.getElementById('edit-prefixes');
            var prefixesSave = document.getElementById('save-prefixes-btn');
            var prefixesCancel = document.getElementById('cancel-prefixes-btn');
            var prefixesEdit = document.getElementById('edit-prefixes-btn');

            prefixesEdit.addEventListener('click', function() {
                prefixesDisplayEl.style.display = 'none';
                prefixesEdit.style.display = 'none';
                prefixesInput.style.display = 'block';
                prefixesSave.style.display = 'inline-block';
                prefixesCancel.style.display = 'inline-block';
                prefixesInput.focus();
            });

            function cancelPrefixes() {
                prefixesInput.value = prefixesDisplayEl.textContent === '—' ? '' : prefixesDisplayEl.textContent;
                prefixesInput.style.display = 'none';
                prefixesSave.style.display = 'none';
                prefixesCancel.style.display = 'none';
                prefixesDisplayEl.style.display = 'inline';
                prefixesEdit.style.display = 'inline-block';
            }
            prefixesCancel.addEventListener('click', cancelPrefixes);

            prefixesSave.addEventListener('click', async function() {
                var newPrefixes = prefixesInput.value.trim();
                try {
                    var res = await fetch('/api/tools/basics/presets/' + encodeURIComponent(presetName), {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({name: presetName, prefixes: newPrefixes})
                    });
                    if (res.ok) {
                        var updated = await res.json();
                        prefixesDisplayEl.textContent = (updated.prefixes || []).join(', ') || '—';
                        cancelPrefixes();
                    } else {
                        var err = await res.json();
                        alert(err.error || err.message || 'Failed to update');
                    }
                } catch(e) {}
            });

            prefixesInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') cancelPrefixes();
            });

        } catch(e) {
            document.getElementById('preset-info').innerHTML = '<div class="muted">Error loading preset</div>';
        }
    }

    document.getElementById('delete-btn').addEventListener('click', async function() {
        if (!confirm('Delete this preset? This cannot be undone.')) return;
        var statusEl = document.getElementById('delete-status');
        statusEl.textContent = 'Deleting…';
        try {
            var res = await fetch('/api/tools/basics/presets/' + encodeURIComponent(presetName), { method: 'DELETE' });
            if (res.ok || res.status === 204) {
                statusEl.innerHTML = '<span class="pill pill-done">Deleted!</span> Redirecting…';
                setTimeout(function() {
                    window.location.href = '/ui/presets';
                }, 600);
            } else {
                var err = await res.json();
                statusEl.innerHTML = '<span class="pill pill-failed">' + esc(err.error || 'Delete failed') + '</span>';
            }
        } catch(e) {
            statusEl.innerHTML = '<span class="pill pill-failed">Request failed</span>';
        }
    });

    loadPreset();
    </script>

    <style>
    .edit-icon-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
        border-radius: 4px;
        line-height: 1;
    }
    .edit-icon-btn:hover { color: var(--accent); background: var(--panel-2); }
    </style>
</div>
</body>
</html>
