<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(title='Create Function', activePath='/ui/functions', content=~{::#page-content})}">
<body>
<div id="page-content">
    <div class="breadcrumb">
        <a href="/">Dashboard</a>
        <span class="sep">/</span>
        <a href="/ui/functions">Functions</a>
        <span class="sep">/</span>
        <strong>New Function</strong>
    </div>

    <h1 class="page-title">Create Custom Function</h1>
    <p class="page-subtitle">Define a new shell-command tool function</p>

    <div class="card" style="margin-bottom:24px;">
        <div class="card-body">
            <form id="create-form" class="stack" style="gap:14px;">
                <div class="form-group">
                    <label>Operation ID</label>
                    <input type="text" id="f-operationId" placeholder="e.g. my_custom_tool" required>
                    <span class="muted small">Unique identifier for this function (used in OpenAPI spec).</span>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="f-description" placeholder="What this function does">
                    <span class="muted small">A short description shown to the LLM.</span>
                </div>
                <div class="form-group">
                    <label>Shell Command</label>
                    <textarea id="f-shellCommand" placeholder="echo hello world" rows="4" style="font-family:monospace;" required></textarea>
                    <span class="muted small">The shell command to execute. No parameters — just a fixed command.</span>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <button type="submit" class="btn btn-primary">Create Function</button>
                    <a href="/ui/functions" class="btn">Cancel</a>
                </div>
            </form>
            <div id="create-status" class="status-box" style="margin-top:12px;"></div>
        </div>
    </div>

    <script>
    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

    document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var statusEl = document.getElementById('create-status');
        statusEl.textContent = 'Creating…';
        try {
            var body = {
                operationId: document.getElementById('f-operationId').value.trim(),
                description: document.getElementById('f-description').value.trim() || null,
                shellCommand: document.getElementById('f-shellCommand').value.trim()
            };
            var res = await fetch('/api/tools/functions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (res.ok) {
                var fn = await res.json();
                statusEl.innerHTML = '<span class="pill pill-done">Created!</span> Redirecting…';
                setTimeout(function() {
                    window.location.href = '/ui/functions/' + encodeURIComponent(fn.id);
                }, 600);
            } else {
                var err = await res.json();
                statusEl.innerHTML = '<span class="pill pill-failed">' + esc(err.error || err.message || 'Error creating function') + '</span>';
            }
        } catch(e) {
            statusEl.innerHTML = '<span class="pill pill-failed">Request failed</span>';
        }
    });
    </script>
</div>
</body>
</html>
