<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(title='Dashboard', activePath='/', content=~{::#page-content})}">
<body>
<div id="page-content">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Overview of your presets, functions, and global locks</p>

    <div class="grid grid-2" style="margin-bottom: 24px;">
        <div class="card">
            <div class="card-body">
                <h3>Presets</h3>
                <div class="stat" id="preset-count">&mdash;</div>
                <div class="muted small">Tool presets</div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <h3>Functions</h3>
                <div class="stat" id="function-count">&mdash;</div>
                <div class="muted small">Built-in + custom</div>
            </div>
        </div>
    </div>

    <div class="grid grid-2" style="margin-bottom: 24px;">
        <div class="card">
            <div class="card-body">
                <h2>Quick Links</h2>
                <div class="stack" style="gap:8px;">
                    <a href="/ui/presets" class="btn btn-primary" style="text-align:center;">Manage Presets</a>
                    <a href="/ui/functions" class="btn btn-primary" style="text-align:center;">Browse Functions</a>
                    <a href="/q/swagger-ui" class="btn" style="text-align:center;">API Docs (Swagger)</a>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <h2>Functions Breakdown</h2>
                <div id="functions-breakdown" class="status-box">Loading&hellip;</div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
            <h2>Global Locks</h2>
            <div id="locks-status" class="status-box">Loading&hellip;</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
            <h2>In-Flight Calls</h2>
            <div id="inflight-status" class="status-box">Loading&hellip;</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
            <h2>Recent Tool Calls</h2>
            <div id="history-status" class="status-box">Loading&hellip;</div>
        </div>
    </div>

    <script>
    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

    function ago(since) {
        if (!since) return '';
        var ms = Date.now() - new Date(since).getTime();
        if (ms < 1000) return 'just now';
        var s = Math.floor(ms / 1000);
        if (s < 60) return s + 's ago';
        var m = Math.floor(s / 60);
        if (m < 60) return m + 'm ago';
        var h = Math.floor(m / 60);
        return h + 'h ' + (m % 60) + 'm ago';
    }

    function msLabel(ms) {
        if (ms < 1000) return ms + 'ms';
        if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
        var m = Math.floor(ms / 60000);
        var s = Math.floor((ms % 60000) / 1000);
        return m + 'm ' + s + 's';
    }

    function lockIcon(locked) {
        return locked ? '&#128274;' : '&#128275;';
    }

    function lockPill(locked) {
        return locked ? 'pill-doing' : 'pill-done';
    }

    function lockLabel(locked) {
        return locked ? 'LOCKED' : 'free';
    }

    function toolPill(tool) {
        if (tool === 'mvn') return 'pill-normal';
        if (tool === 'git') return 'pill-doing';
        if (tool === 'docker') return 'pill-high';
        return 'pill-todo';
    }

    async function refresh() {
        try {
            var [presetsRes, builtinRes, customRes, locksRes] = await Promise.all([
                fetch('/api/tools/basics/presets/all'),
                fetch('/api/functions/builtin'),
                fetch('/api/tools/functions').catch(function() { return {ok: false}; }),
                fetch('/api/tools/build/locks').catch(function() { return {ok: false}; })
            ]);

            var presets = presetsRes.ok ? await presetsRes.json() : [];
            var builtins = builtinRes.ok ? await builtinRes.json() : [];
            var customs = customRes.ok ? await customRes.json() : [];
            var locksData = locksRes.ok ? await locksRes.json() : {};
            var locks = locksData.locks || {};
            var lockMode = locksData.mode || 'synchronize';
            var inFlight = locksData.inFlight || [];
            var history = locksData.history || [];

            document.getElementById('preset-count').textContent = presets.length;
            document.getElementById('function-count').textContent = builtins.length + customs.length;

            var breakdownHtml = '<div class="stack" style="gap:8px;">'
                + '<div style="display:flex;justify-content:space-between;align-items:center;">'
                + '<span class="pill pill-normal" style="white-space:nowrap;">built-in</span>'
                + '<span style="font-size:18px;font-weight:700;">' + builtins.length + '</span>'
                + '</div>'
                + '<div style="display:flex;justify-content:space-between;align-items:center;">'
                + '<span class="pill pill-doing" style="white-space:nowrap;">custom</span>'
                + '<span style="font-size:18px;font-weight:700;">' + customs.length + '</span>'
                + '</div>'
                + '</div>';
            document.getElementById('functions-breakdown').innerHTML = breakdownHtml;

            // ── locks ──────────────────────────────────────────
            var lockNames = ['mvn', 'git', 'docker'];
            var modePill = lockMode === 'reject' ? 'pill-high' : 'pill-normal';
            var locksHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
                + '<span class="muted small">Mode</span>'
                + '<span class="pill ' + modePill + '">' + esc(lockMode) + '</span>'
                + '</div>'
                + '<div class="grid grid-3" style="gap:12px;">';
            for (var i = 0; i < lockNames.length; i++) {
                var name = lockNames[i];
                var info = locks[name] || {locked: false, since: null, operation: null};
                locksHtml += '<div style="background:var(--panel-2);border-radius:8px;padding:12px 14px;text-align:center;">'
                    + '<div style="font-size:24px;margin-bottom:4px;">' + lockIcon(info.locked) + '</div>'
                    + '<div style="font-weight:700;font-size:15px;text-transform:uppercase;">' + esc(name) + '</div>'
                    + '<div><span class="pill ' + lockPill(info.locked) + '" style="margin-top:6px;">' + lockLabel(info.locked) + '</span></div>';
                if (info.locked && info.since) {
                    locksHtml += '<div class="muted small" style="margin-top:4px;">' + esc(ago(info.since)) + '</div>';
                }
                locksHtml += '</div>';
            }
            locksHtml += '</div>';
            document.getElementById('locks-status').innerHTML = locksHtml;

            // ── in-flight ──────────────────────────────────────
            if (inFlight.length === 0) {
                document.getElementById('inflight-status').innerHTML = '<div class="muted">No calls in progress</div>';
            } else {
                var inflightHtml = '<div class="stack" style="gap:8px;">';
                for (var j = 0; j < inFlight.length; j++) {
                    var f = inFlight[j];
                    inflightHtml += '<div style="display:flex;align-items:center;gap:10px;background:var(--panel-2);border-radius:8px;padding:10px 14px;">'
                        + '<span class="pill ' + toolPill(f.tool) + '">' + esc(f.tool) + '</span>'
                        + '<span style="flex:1;font-size:14px;">' + esc(f.operationId) + '</span>'
                        + '<span class="muted small">' + esc(ago(f.startedAt)) + '</span>'
                        + '<span style="color:var(--doing);font-size:20px;">&#x23F3;</span>'
                        + '</div>';
                }
                inflightHtml += '</div>';
                document.getElementById('inflight-status').innerHTML = inflightHtml;
            }

            // ── history ───────────────────────────────────────
            if (history.length === 0) {
                document.getElementById('history-status').innerHTML = '<div class="muted">No calls yet</div>';
            } else {
                var histHtml = '<div class="stack" style="gap:6px;">';
                for (var k = 0; k < history.length; k++) {
                    var h = history[k];
                    var statusIcon = h.success ? '&#x2705;' : '&#x274C;';
                    var statusColor = h.success ? 'var(--success)' : 'var(--danger)';
                    histHtml += '<div style="display:flex;align-items:center;gap:10px;background:var(--panel-2);border-radius:8px;padding:8px 14px;">'
                        + '<span class="pill ' + toolPill(h.tool) + '">' + esc(h.tool) + '</span>'
                        + '<span style="flex:1;font-size:13px;">' + esc(h.operationId) + '</span>'
                        + '<span class="muted small" style="min-width:55px;text-align:right;">' + esc(msLabel(h.durationMs)) + '</span>'
                        + '<span style="color:' + statusColor + ';font-size:14px;">' + statusIcon + '</span>'
                        + '<span class="muted small" style="min-width:70px;text-align:right;">' + esc(ago(h.startedAt)) + '</span>'
                        + '</div>';
                }
                histHtml += '</div>';
                document.getElementById('history-status').innerHTML = histHtml;
            }

        } catch(e) {
            console.error('Dashboard refresh failed', e);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        refresh();
        setInterval(refresh, 5000);
    });
    </script>

</div>
</body>
</html>
