<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLMToolbox — login failed</title>
    <style>
        :root {
            --bg: #0f1318;
            --panel: #171d24;
            --text: #e2e8f0;
            --muted: #8899aa;
            --accent: #6cb4ee;
            --danger: #f87171;
            --border: #2a3442;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .brand {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--accent), #5eead4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
        .message {
            background: #4a1a1a;
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            color: var(--danger);
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #1a3a5c;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn:hover { border-color: var(--accent); background: #235d85; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand">LLMToolbox</div>
        <div class="tagline">LLM tool presets &amp; functions</div>
        <div class="message" th:text="${message}">Your session expired or credentials are invalid.</div>
        <a href="/login.html" class="btn">Back to login</a>
    </div>
</body>
</html>
