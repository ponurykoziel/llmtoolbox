quarkus.application.name=llmtoolbox
quarkus.http.host=127.0.0.1
quarkus.http.port=8080

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:llmtoolbox;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── API key pepper for hashing user-created keys ───────────────────
llmtoolbox.api-key.pepper=llmtoolbox-pepper
llmtoolbox.command.timeout-seconds=30
llmtoolbox.terminal.allow=false
llmtoolbox.files.allowed-root=/opt/app
llmtoolbox.files.max-read-bytes=1048576
llmtoolbox.files.max-pack-total-bytes=2097152
llmtoolbox.files.max-pack-file-bytes=262144
llmtoolbox.files.max-pack-files=200

llmtoolbox.calculator.rounding-digits=8

llmtoolbox.net.curl.block-private-ips=false

llmtoolbox.communication.telegram.token=0
llmtoolbox.communication.telegram.chatid=0
quarkus.smallrye-openapi.store-schema-directory=target/classes/META-INF

# ── Security ──────────────────────────────────────────────────────

# master api key
llmtoolbox.auth.token=change-me

# Initial admin user — seeded on first boot
llmtoolbox.auth.admin.username=admin
llmtoolbox.auth.admin.password=admin
quarkus.security.auth.enabled-in-dev-mode=true

# Form login for browser UI
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=/login.html
quarkus.http.auth.form.error-page=/login-failed.html
quarkus.http.auth.form.landing-page=/
quarkus.http.auth.form.post-location=/j_security_check
quarkus.http.auth.form.username-parameter=j_username
quarkus.http.auth.form.password-parameter=j_password
quarkus.http.auth.form.cookie-name=llmtoolbox_session
quarkus.http.auth.form.timeout=86400
quarkus.http.auth.form.new-cookie-interval=3600

# JDBC realm
quarkus.security.jdbc.enabled=true
quarkus.security.jdbc.principal-query.sql=SELECT u.password, u.role FROM users u WHERE u.username = ?
quarkus.security.jdbc.principal-query.clear-password-mapper.enabled=false
quarkus.security.jdbc.principal-query.bcrypt-password-mapper.enabled=true
quarkus.security.jdbc.principal-query.bcrypt-password-mapper.password-index=1
quarkus.security.jdbc.principal-query.attribute-mappings.0.index=2
quarkus.security.jdbc.principal-query.attribute-mappings.0.to=groups

# ── Permission rules ──────────────────────────────────────────────

# API — permit all at HTTP level; BearerFilter handles Bearer token / session auth
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=permit

# UI pages — authenticated
quarkus.http.auth.permission.ui.paths=/ui/*
quarkus.http.auth.permission.ui.policy=authenticated

# Root — authenticated
quarkus.http.auth.permission.root.paths=/
quarkus.http.auth.permission.root.policy=authenticated

# Swagger UI — authenticated
quarkus.http.auth.permission.swagger.paths=/q/swagger-ui/*
quarkus.http.auth.permission.swagger.policy=authenticated

# Health — permit all
quarkus.http.auth.permission.health.paths=/q/health/*
quarkus.http.auth.permission.health.policy=permit

# OpenAPI spec — permit all
quarkus.http.auth.permission.openapi.paths=/q/openapi
quarkus.http.auth.permission.openapi.policy=permit

# Static login/error pages — permit all
quarkus.http.auth.permission.login.paths=/login.html,/login-failed.html
quarkus.http.auth.permission.login.policy=permit

# j_security_check — permit all (form login POST target)
quarkus.http.auth.permission.jsec.paths=/j_security_check
quarkus.http.auth.permission.jsec.policy=permit

# Logout — permit all
quarkus.http.auth.permission.logout.paths=/logout
quarkus.http.auth.permission.logout.policy=permit
